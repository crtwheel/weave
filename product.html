<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Weave</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">W</span>
        Weave
      </a>
      <nav class="nav-links">
        <a href="index.html">Products</a>
        <a href="faq.html">FAQ</a>
        <a href="dashboard.html">Dashboard</a>
      </nav>
    </div>
  </header>

  <section class="page-section">
    <div class="container">
      <a href="index.html" class="btn btn-ghost btn-sm mb-4" style="margin-left:-0.5rem;">&larr; Back</a>
      <div id="product-detail">
        <div class="skeleton" style="height:300px;margin-bottom:2rem;"></div>
        <div class="skeleton" style="height:40px;width:60%;margin-bottom:1rem;"></div>
        <div class="skeleton" style="height:20px;width:40%;"></div>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/purchase-form.js"></script>
  <script>
    async function loadProduct() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const detail = document.getElementById('product-detail');

      if (!slug) {
        detail.innerHTML = '<p class="text-secondary">No product selected. <a href="index.html" class="text-accent">Browse products.</a></p>';
        return;
      }

      try {
        const { data, error } = await supabaseClient
          .from('templates')
          .select('*')
          .eq('slug', slug)
          .single();

        if (error || !data) throw error;

        detail.innerHTML = `
          <div class="product-layout">
            <div>
              <div class="product-preview">
                ${data.preview_url
                  ? `<img src="${data.preview_url}" alt="${data.name}">`
                  : 'Preview'}
              </div>
            </div>
            <div>
              <h1 class="page-title" style="font-size:2rem;">${data.name}</h1>
              <p class="page-subtitle">${data.description || ''}</p>

              <div style="margin-bottom:2rem;">
                <div class="card-price">$${data.price_usd}</div>
                <div class="card-price-sub">~${data.price_eth} ETH</div>
              </div>

              <h3 style="font-weight:600;margin-bottom:0.75rem;">What's included</h3>
              <ul class="feature-list" style="margin-bottom:2rem;">
                <li>Responsive design</li>
                <li>Tailwind CSS 3.x</li>
                <li>6 pre-built sections</li>
                <li>Dark theme ready</li>
                <li>Clean HTML structure</li>
              </ul>

              <h3 style="font-weight:600;margin-bottom:1rem;">How to buy</h3>
              <ol class="steps-list">
                <li>Send exactly <strong>${data.price_eth} ETH</strong> (or USDC equivalent) to the wallet below.
                  <div class="wallet-address" style="margin-top:0.75rem;">
                    <span class="addr-text">${WEAVE_CONFIG.WALLET_ADDRESS}</span>
                    <button class="copy-btn" onclick="copyWallet()">Copy</button>
                  </div>
                </li>
                <li>Copy the transaction hash (0x...) from your wallet after sending.</li>
                <li>Fill in the form below with your email, transaction hash, and sending wallet address.</li>
                <li>Wait for verification (usually under 5 minutes). Check your dashboard.</li>
              </ol>
            </div>
          </div>

          <div style="max-width:600px;margin-top:4rem;">
            <div class="purchase-section">
              <h2 style="font-size:1.2rem;font-weight:600;margin-bottom:0.5rem;">Verify Your Purchase</h2>
              <p class="text-secondary" style="margin-bottom:1.5rem;font-size:0.9rem;">Already sent the crypto? Enter your details to get access.</p>
              <form id="purchase-form" onsubmit="submitPurchase(event, ${data.id})">
                <div class="form-group">
                  <label class="form-label" for="email">Email address</label>
                  <input class="form-input" type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                  <label class="form-label" for="tx-hash">Transaction hash</label>
                  <input class="form-input font-mono" type="text" id="tx-hash" required placeholder="0x...">
                </div>
                <div class="form-group">
                  <label class="form-label" for="sender-wallet">Your sending wallet address</label>
                  <input class="form-input font-mono" type="text" id="sender-wallet" required placeholder="0x...">
                </div>
                <div class="form-group">
                  <label class="form-label" for="discord">Discord username (optional)</label>
                  <input class="form-input" type="text" id="discord" placeholder="username">
                </div>
                <button class="btn btn-primary" type="submit" id="submit-btn">Submit for Verification</button>
                <div id="form-status" style="margin-top:1rem;font-size:0.9rem;"></div>
              </form>
            </div>
          </div>
        `;
      } catch (err) {
        detail.innerHTML = '<p class="text-secondary">Product not found. <a href="index.html" class="text-accent">Browse products.</a></p>';
      }
    }

    function copyWallet() {
      navigator.clipboard.writeText(WEAVE_CONFIG.WALLET_ADDRESS);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
    }

    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>
</body>
</html>
