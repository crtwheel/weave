<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Template Management — Weave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="taskbar">
    <div class="taskbar-left">
      <span class="taskbar-dot online"></span>
      <span>weave</span>
    </div>
    <div class="taskbar-right">
      <span class="taskbar-wallet">0xbe9...D43fb</span>
      <span class="taskbar-version">v1.0</span>
    </div>
  </div>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand"><span class="logo-icon">W</span> Weave</div>
      <nav class="sidebar-nav">
        <a href="index.html">Dashboard</a>
        <a href="users.html">Users</a>
        <a href="templates.html" class="active">Templates</a>
        <a href="tickets.html">Tickets</a>
        <a href="businesses.html">Businesses</a>
        <a href="ads.html">Ads</a>
        <a href="comments.html">Comments</a>
        <a href="analytics.html">Analytics</a>
        <a href="logs.html">Audit Log</a>
        <a href="settings.html">Settings</a>

      </nav>
    </aside>
    <main class="admin-main">
      <header class="admin-topbar">
        <h1 class="admin-topbar-title">Template Management</h1>
        <button class="btn btn-outline btn-sm" onclick="handleSignOut()">Sign Out</button>
      </header>
      <div class="admin-content">
        <div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">
          <button class="btn btn-accent" onclick="openCreateModal()">Create Template</button>
        </div>
        <div class="glass" style="padding:0;overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Downloads</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="templates-body"><tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-secondary);">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Create/Edit Modal -->
  <div id="template-modal" class="modal-overlay" style="display:none;">
    <div class="modal glass" style="max-width:600px;padding:2rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <h2 class="font-display" style="font-size:1.1rem;font-weight:700;" id="modal-title">Create Template</h2>
        <button class="btn btn-outline btn-sm" onclick="closeModal()">X</button>
      </div>
      <form onsubmit="saveTemplate(event)">
        <input type="hidden" id="tf-id">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" id="tf-name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Slug</label>
          <input class="form-input" id="tf-slug" required>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-input" id="tf-description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-input" id="tf-category">
            <option value="">Select category</option>
            <option value="landing-page">Landing Page</option>
            <option value="dashboard">Dashboard</option>
            <option value="portfolio">Portfolio</option>
            <option value="ecommerce">E-commerce</option>
            <option value="blog">Blog</option>
            <option value="saas">SaaS</option>
          </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div class="form-group">
            <label class="form-label">Price (USD)</label>
            <input class="form-input" id="tf-price-usd" type="number" step="0.01" required>
          </div>
          <div class="form-group">
            <label class="form-label">Price (ETH)</label>
            <input class="form-input" id="tf-price-eth" type="number" step="0.00000001" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Tags (comma-separated)</label>
          <input class="form-input" id="tf-tags" placeholder="tailwind, react, landing">
        </div>
        <div class="form-group">
          <label class="form-label">Features (one per line)</label>
          <textarea class="form-input" id="tf-features" rows="3" placeholder="Responsive design&#10;Dark mode&#10;SEO friendly"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Storage Path</label>
          <input class="form-input" id="tf-storage-path">
        </div>
        <div class="form-group">
          <label class="form-label">Preview URL</label>
          <input class="form-input" id="tf-preview-url" type="url">
        </div>
        <div class="form-group">
          <label class="form-label">Version</label>
          <input class="form-input" id="tf-version" value="1.0.0">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:0.75rem;">
          <label class="form-label" style="margin:0;">Published</label>
          <label class="toggle">
            <input type="checkbox" id="tf-published">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-accent" id="modal-save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="delete-modal" class="modal-overlay" style="display:none;">
    <div class="modal glass" style="max-width:400px;padding:2rem;text-align:center;">
      <h2 class="font-display" style="font-size:1.1rem;font-weight:700;margin-bottom:0.75rem;">Delete Template</h2>
      <p style="color:var(--text-secondary);margin-bottom:1.5rem;">Are you sure you want to delete this template?</p>
      <div style="display:flex;gap:0.75rem;justify-content:center;">
        <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-primary" id="confirm-delete-btn" style="background:var(--error);color:#fff;" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="../js/supabase.js"></script>
  <script src="../js/services/validation.js"></script>
  <script src="../js/services/cache.js"></script>
  <script src="../js/services/auth.js"></script>
  <script src="../js/services/notifications.js"></script>
  <script src="../js/services/storage.js"></script>
  <script src="../js/services/templates.js"></script>
  <script src="../js/services/purchases.js"></script>
  <script src="../js/services/analytics.js"></script>
  <script src="../js/services/admin.js"></script>
  <script>
    let deleteId = null;

    async function handleSignOut() {
      if ('sbAuth' in window) await sbAuth.signOut();
      else await sbSignOut();
      window.location.href = '../dashboard.html';
    }

    function openCreateModal() {
      document.getElementById('modal-title').textContent = 'Create Template';
      document.getElementById('modal-save-btn').textContent = 'Save';
      document.getElementById('tf-id').value = '';
      ['tf-name','tf-slug','tf-description','tf-price-usd','tf-price-eth','tf-tags','tf-features','tf-storage-path','tf-preview-url','tf-version'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('tf-category').value = '';
      document.getElementById('tf-published').checked = false;
      document.getElementById('template-modal').style.display = 'flex';
    }

    function openEditModal(template) {
      document.getElementById('modal-title').textContent = 'Edit Template';
      document.getElementById('modal-save-btn').textContent = 'Update';
      document.getElementById('tf-id').value = template.id;
      document.getElementById('tf-name').value = template.name || '';
      document.getElementById('tf-slug').value = template.slug || '';
      document.getElementById('tf-description').value = template.description || '';
      document.getElementById('tf-category').value = template.category_slug || '';
      document.getElementById('tf-price-usd').value = template.price_usd || '';
      document.getElementById('tf-price-eth').value = template.price_eth || '';
      document.getElementById('tf-tags').value = (template.tags || []).join(', ');
      document.getElementById('tf-features').value = (template.features || []).join('
');
      document.getElementById('tf-storage-path').value = template.storage_path || '';
      document.getElementById('tf-preview-url').value = template.preview_url || '';
      document.getElementById('tf-version').value = template.version || '1.0.0';
      document.getElementById('tf-published').checked = !!template.published;
      document.getElementById('template-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('template-modal').style.display = 'none';
    }

    function openDeleteModal(id) {
      deleteId = id;
      document.getElementById('delete-modal').style.display = 'flex';
    }

    function closeDeleteModal() {
      deleteId = null;
      document.getElementById('delete-modal').style.display = 'none';
    }

    async function saveTemplate(e) {
      e.preventDefault();
      const btn = document.getElementById('modal-save-btn');
      btn.disabled = true;
      btn.textContent = '...';
      const id = document.getElementById('tf-id').value;
      const data = {
        name: document.getElementById('tf-name').value,
        slug: document.getElementById('tf-slug').value,
        description: document.getElementById('tf-description').value,
        category_slug: document.getElementById('tf-category').value || null,
        price_usd: parseFloat(document.getElementById('tf-price-usd').value),
        price_eth: parseFloat(document.getElementById('tf-price-eth').value),
        tags: document.getElementById('tf-tags').value.split(',').map(s => s.trim()).filter(Boolean),
        features: document.getElementById('tf-features').value.split('
').map(s => s.trim()).filter(Boolean),
        storage_path: document.getElementById('tf-storage-path').value,
        preview_url: document.getElementById('tf-preview-url').value || null,
        version: document.getElementById('tf-version').value || '1.0.0',
        published: document.getElementById('tf-published').checked
      };
      try {
        if (id) {
          await sbAdmin.updateTemplate(id, data);
          if ('sbNotify' in window) sbNotify.success('Template updated');
        } else {
          await sbAdmin.createTemplate(data);
          if ('sbNotify' in window) sbNotify.success('Template created');
        }
        closeModal();
        loadTemplates();
      } catch (err) {
        if ('sbNotify' in window) sbNotify.error('Failed: ' + err.message);
        else alert('Failed: ' + err.message);
      }
      btn.disabled = false;
      btn.textContent = id ? 'Update' : 'Save';
    }

    async function confirmDelete() {
      if (!deleteId) return;
      const btn = document.getElementById('confirm-delete-btn');
      btn.disabled = true;
      btn.textContent = '...';
      try {
        await sbAdmin.deleteTemplate(deleteId);
        if ('sbNotify' in window) sbNotify.success('Template deleted');
        closeDeleteModal();
        loadTemplates();
      } catch (err) {
        if ('sbNotify' in window) sbNotify.error('Failed: ' + err.message);
        else alert('Failed: ' + err.message);
      }
      btn.disabled = false;
      btn.textContent = 'Delete';
    }

    async function loadTemplates() {
      const tbody = document.getElementById('templates-body');
      try {
        const templates = await sbAdmin.listTemplates();
        if (!templates || !templates.length) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-secondary);">No templates found.</td></tr>';
          return;
        }
        tbody.innerHTML = templates.map(t => {
          const statusBadge = t.published ? 'badge badge-verified' : 'badge badge-pending';
          return '<tr>' +
            '<td class="cell-mono">' + t.id + '</td>' +
            '<td>' + t.name + '</td>' +
            '<td>' + (t.category_slug || '—') + '</td>' +
            '<td class="cell-mono">$' + Number(t.price_usd).toFixed(2) + '</td>' +
            '<td>' + (t.downloads ?? 0) + '</td>' +
            '<td>' + (t.rating ?? '—') + '</td>' +
            '<td><span class="' + statusBadge + '">' + (t.published ? 'Published' : 'Draft') + '</span></td>' +
            '<td class="actions">' +
              '<button class="btn btn-accent btn-sm" onclick="openEditModal(' + t.id + ')" data-template=\'' + JSON.stringify(t).replace(/'/g, '&#39;') + '\'>Edit</button>' +
              '<button class="btn btn-outline btn-sm" onclick="openDeleteModal(' + t.id + ')" style="color:var(--error);">Delete</button>' +
            '</td>' +
          '</tr>';
        }).join('');
        document.querySelectorAll('#templates-body .btn-accent').forEach(btn => {
          btn.addEventListener('click', function() {
            const t = JSON.parse(this.dataset.template);
            openEditModal(t);
          });
        });
      } catch (err) {
        sbLog.error('Failed to load templates', err);
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--error);">Error: ' + err.message + '</td></tr>';
      }
    }

    async function init() {
      const user = await sbGetUser();
      if (!user) { window.location.href = '../dashboard.html'; return; }
      if ('sbAuth' in window) await sbAuth.requireRole('admin').catch(() => {});
      loadTemplates();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
