<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comment Moderation — Weave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="taskbar">
    <div class="taskbar-left">
      <span class="taskbar-dot online"></span>
      <span>weave</span>
    </div>
    <div class="taskbar-right">
      <span class="taskbar-wallet">0xbe9...D43fb</span>
      <span class="taskbar-version">v1.0</span>
    </div>
  </div>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand"><span class="logo-icon">W</span> Weave</div>
      <nav class="sidebar-nav">
        <a href="index.html">Dashboard</a>
        <a href="users.html">Users</a>
        <a href="templates.html">Templates</a>
        <a href="tickets.html">Tickets</a>
        <a href="businesses.html">Businesses</a>
        <a href="ads.html">Ads</a>
        <a href="comments.html" class="active">Comments</a>
        <a href="analytics.html">Analytics</a>
        <a href="logs.html">Audit Log</a>
        <a href="settings.html">Settings</a>

      </nav>
    </aside>
    <main class="admin-main">
      <header class="admin-topbar">
        <h1 class="admin-topbar-title">Comment Moderation</h1>
        <button class="btn btn-outline btn-sm" onclick="handleSignOut()">Sign Out</button>
      </header>
      <div class="admin-content">
        <div class="glass" style="padding:0.75rem 1rem;margin-bottom:1.5rem;">
          <input class="form-input" id="search-input" placeholder="Search by template name or content..." style="padding:0.5rem 0.75rem;font-size:0.82rem;" oninput="filterComments()">
        </div>
        <div class="glass" style="padding:0;overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>ID</th><th>Template</th><th>User</th><th>Content</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody id="comments-body"><tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-secondary);">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- View Modal -->
  <div id="view-modal" class="modal-overlay" style="display:none;">
    <div class="modal glass" style="max-width:500px;padding:2rem;">
      <div class="admin-flex-between" style="margin-bottom:1rem;">
        <h2 class="font-display" style="font-size:1.1rem;font-weight:700;">Comment</h2>
        <button class="btn btn-outline btn-sm" onclick="closeViewModal()">X</button>
      </div>
      <div id="view-modal-content" style="font-size:0.9rem;line-height:1.6;color:var(--text);"></div>
    </div>
  </div>

  <!-- Delete Confirmation -->
  <div id="delete-modal" class="modal-overlay" style="display:none;">
    <div class="modal glass" style="max-width:400px;padding:2rem;text-align:center;">
      <h2 class="font-display" style="font-size:1.1rem;font-weight:700;margin-bottom:0.75rem;">Delete Comment</h2>
      <p style="color:var(--text-secondary);margin-bottom:1.5rem;">Are you sure you want to delete this comment?</p>
      <div style="display:flex;gap:0.75rem;justify-content:center;">
        <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-primary" id="confirm-delete-btn" style="background:var(--error);color:#fff;" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <style>
    .comment-expanded { padding:1rem; background:var(--bg-alt); border-radius:var(--radius-sm); font-size:0.88rem; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
  </style>

  <script src="../js/supabase.js"></script>
  <script src="../js/services/validation.js"></script>
  <script src="../js/services/cache.js"></script>
  <script src="../js/services/auth.js"></script>
  <script src="../js/services/notifications.js"></script>
  <script src="../js/services/comments.js"></script>
  <script src="../js/services/tickets.js"></script>
  <script src="../js/services/businesses.js"></script>
  <script src="../js/services/ads.js"></script>
  <script src="../js/services/admin.js"></script>
  <script>
    let allComments = [];
    let deleteId = null;

    async function handleSignOut() {
      if ('sbAuth' in window) await sbAuth.signOut();
      else await sbSignOut();
      window.location.href = '../dashboard.html';
    }

    function filterComments() {
      renderComments();
    }

    function renderComments() {
      const tbody = document.getElementById('comments-body');
      const search = document.getElementById('search-input').value.toLowerCase().trim();
      let filtered = allComments;
      if (search) {
        filtered = allComments.filter(c =>
          (c.template_name || '').toLowerCase().includes(search) ||
          (c.content || '').toLowerCase().includes(search)
        );
      }
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-secondary);">No comments to moderate.</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(c => {
        const date = c.created_at ? new Date(c.created_at).toLocaleDateString() : '—';
        const truncated = (c.content || '').length > 80 ? c.content.slice(0, 80) + '...' : (c.content || '—');
        return '<tr>' +
          '<td class="cell-mono">' + (c.id ? c.id.toString().slice(0, 8) + '...' : '—') + '</td>' +
          '<td>' + (c.template_name || c.template_id || '—') + '</td>' +
          '<td class="cell-mono">' + (c.user_email || c.user_id || '—') + '</td>' +
          '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + truncated + '</td>' +
          '<td style="font-family:var(--font-display);font-size:0.7rem;white-space:nowrap;">' + date + '</td>' +
          '<td class="cell-actions">' +
            '<button class="btn btn-accent btn-sm" onclick="viewComment(' + JSON.stringify(c).replace(/'/g, '&#39;') + ')">View</button>' +
            '<button class="btn btn-outline btn-sm" onclick="openDeleteModal(\'' + c.id + '\')" style="color:var(--error);">Delete</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    async function loadComments() {
      const tbody = document.getElementById('comments-body');
      try {
        const templates = await sbAdmin.listTemplates();
        if (templates && templates.length) {
          const promises = templates.map(t => sbComments.list(t.id).then(comments => {
            return (comments || []).map(c => ({ ...c, template_name: t.name, template_id: t.id }));
          }));
          const nested = await Promise.all(promises);
          allComments = nested.flat().sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        }
        if (!allComments.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-secondary);">No comments to moderate.</td></tr>';
          return;
        }
        renderComments();
      } catch (err) {
        sbLog.error('Failed to load comments', err);
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--error);">Error: ' + err.message + '</td></tr>';
      }
    }

    function viewComment(comment) {
      const container = document.getElementById('view-modal-content');
      container.innerHTML = '<div style="margin-bottom:0.75rem;font-size:0.8rem;color:var(--text-secondary);">' +
        '<strong>Template:</strong> ' + (comment.template_name || '—') + '<br>' +
        '<strong>User:</strong> ' + (comment.user_email || comment.user_id || '—') + '<br>' +
        '<strong>Date:</strong> ' + (comment.created_at ? new Date(comment.created_at).toLocaleString() : '—') +
        '</div>' +
        '<div class="comment-expanded">' + (comment.content || '—') + '</div>';
      document.getElementById('view-modal').style.display = 'flex';
    }

    function closeViewModal() {
      document.getElementById('view-modal').style.display = 'none';
    }

    function openDeleteModal(id) {
      deleteId = id;
      document.getElementById('delete-modal').style.display = 'flex';
    }

    function closeDeleteModal() {
      deleteId = null;
      document.getElementById('delete-modal').style.display = 'none';
    }

    async function confirmDelete() {
      if (!deleteId) return;
      const btn = document.getElementById('confirm-delete-btn');
      btn.disabled = true;
      btn.textContent = '...';
      try {
        await sbComments.delete(deleteId);
        if ('sbNotify' in window) sbNotify.success('Comment deleted');
        closeDeleteModal();
        loadComments();
      } catch (err) {
        if ('sbNotify' in window) sbNotify.error('Failed: ' + err.message);
        else alert('Failed: ' + err.message);
      }
      btn.disabled = false;
      btn.textContent = 'Delete';
    }

    async function init() {
      const user = await sbGetUser();
      if (!user) { window.location.href = '../dashboard.html'; return; }
      loadComments();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
