<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Listings — Weave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="taskbar">
    <div class="taskbar-left">
      <span class="taskbar-dot online"></span>
      <span>weave</span>
    </div>
    <div class="taskbar-right">
      <span class="taskbar-wallet">0xbe9...D43fb</span>
      <span class="taskbar-version">v1.0</span>
    </div>
  </div>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand"><span class="logo-icon">W</span> Weave</div>
      <nav class="sidebar-nav">
        <a href="index.html">Dashboard</a>
        <a href="users.html">Users</a>
        <a href="templates.html">Templates</a>
        <a href="tickets.html">Tickets</a>
        <a href="businesses.html" class="active">Businesses</a>
        <a href="ads.html">Ads</a>
        <a href="comments.html">Comments</a>
        <a href="analytics.html">Analytics</a>
        <a href="logs.html">Audit Log</a>
        <a href="settings.html">Settings</a>

      </nav>
    </aside>
    <main class="admin-main">
      <header class="admin-topbar">
        <h1 class="admin-topbar-title">Business Listings</h1>
        <button class="btn btn-outline btn-sm" onclick="handleSignOut()">Sign Out</button>
      </header>
      <div class="admin-content">
        <div class="admin-filter-bar glass" style="padding:0.75rem 1rem;margin-bottom:1.5rem;display:flex;gap:0.5rem;flex-wrap:wrap;">
          <button class="btn btn-sm filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
          <button class="btn btn-sm filter-btn" data-filter="pending" onclick="setFilter('pending')">Pending Approval</button>
          <button class="btn btn-sm filter-btn" data-filter="approved" onclick="setFilter('approved')">Approved</button>
        </div>
        <div class="glass" style="padding:0;overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>ID</th><th>Name</th><th>Owner</th><th>Category</th><th>Website</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody id="businesses-body"><tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-secondary);">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay" style="display:none;">
    <div class="modal glass" style="max-width:520px;padding:2rem;">
      <div class="admin-flex-between" style="margin-bottom:1.5rem;">
        <h2 class="font-display" style="font-size:1.1rem;font-weight:700;">Edit Business</h2>
        <button class="btn btn-outline btn-sm" onclick="closeEditModal()">X</button>
      </div>
      <form onsubmit="saveBusiness(event)">
        <input type="hidden" id="bf-id">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" id="bf-name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Slug</label>
          <input class="form-input" id="bf-slug">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <input class="form-input" id="bf-category">
        </div>
        <div class="form-group">
          <label class="form-label">Website</label>
          <input class="form-input" id="bf-website" type="url">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-input" id="bf-description" rows="3"></textarea>
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;">
          <button type="button" class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn btn-accent">Save</button>
        </div>
      </form>
    </div>
  </div>

  <style>
    .admin-filter-bar .filter-btn { background:transparent; border:1px solid var(--border); color:var(--text-secondary); cursor:pointer; padding:0.35rem 0.85rem; border-radius:var(--radius-sm); font-size:0.78rem; font-family:var(--font-body); transition:all 0.15s; }
    .admin-filter-bar .filter-btn:hover { border-color:var(--accent); color:var(--text); }
    .admin-filter-bar .filter-btn.active { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:600; }
    .admin-badge-pending { background:rgba(234,179,8,0.1); color:#b45309; border:1px solid rgba(234,179,8,0.15); }
    .admin-badge-approved { background:rgba(34,197,94,0.1); color:#15803d; border:1px solid rgba(34,197,94,0.15); }
  </style>

  <script src="../js/supabase.js"></script>
  <script src="../js/services/validation.js"></script>
  <script src="../js/services/cache.js"></script>
  <script src="../js/services/auth.js"></script>
  <script src="../js/services/notifications.js"></script>
  <script src="../js/services/comments.js"></script>
  <script src="../js/services/tickets.js"></script>
  <script src="../js/services/businesses.js"></script>
  <script src="../js/services/ads.js"></script>
  <script>
    let allBusinesses = [];
    let currentFilter = 'all';

    async function handleSignOut() {
      if ('sbAuth' in window) await sbAuth.signOut();
      else await sbSignOut();
      window.location.href = '../dashboard.html';
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
      renderBusinesses();
    }

    function renderBusinesses() {
      const tbody = document.getElementById('businesses-body');
      let filtered = allBusinesses;
      if (currentFilter === 'pending') filtered = allBusinesses.filter(b => !b.approved);
      else if (currentFilter === 'approved') filtered = allBusinesses.filter(b => b.approved);
      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-secondary);">No businesses found.</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(b => {
        const date = b.created_at ? new Date(b.created_at).toLocaleDateString() : '—';
        const statusClass = b.approved ? 'admin-badge-approved' : 'admin-badge-pending';
        const statusText = b.approved ? 'Approved' : 'Pending';
        return '<tr>' +
          '<td class="cell-mono">' + (b.id ? b.id.toString().slice(0, 8) + '...' : '—') + '</td>' +
          '<td>' + (b.name || '—') + '</td>' +
          '<td class="cell-mono">' + (b.owner_email || b.owner_id || '—') + '</td>' +
          '<td>' + (b.category || '—') + '</td>' +
          '<td class="cell-mono" style="font-size:0.72rem;">' + (b.website ? '<a href="' + b.website + '" target="_blank" style="color:var(--accent);text-decoration:none;">' + b.website.slice(0, 30) + '</a>' : '—') + '</td>' +
          '<td><span class="admin-badge ' + statusClass + '">' + statusText + '</span></td>' +
          '<td style="font-family:var(--font-display);font-size:0.7rem;white-space:nowrap;">' + date + '</td>' +
          '<td class="cell-actions">' +
            (!b.approved ? '<button class="btn btn-sm" style="background:var(--success);color:#fff;border:none;padding:0.3rem 0.7rem;border-radius:var(--radius-sm);font-size:0.75rem;cursor:pointer;" onclick="approveBusiness(\'' + b.id + '\')">Approve</button>' : '') +
            '<button class="btn btn-accent btn-sm" onclick="openEditModal(' + JSON.stringify(b).replace(/'/g, '&#39;') + ')">Edit</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    async function loadBusinesses() {
      const tbody = document.getElementById('businesses-body');
      try {
        allBusinesses = await sbBusinesses.listAll();
        if (!allBusinesses || !allBusinesses.length) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text-secondary);">No businesses found.</td></tr>';
          return;
        }
        renderBusinesses();
      } catch (err) {
        sbLog.error('Failed to load businesses', err);
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--error);">Error: ' + err.message + '</td></tr>';
      }
    }

    async function approveBusiness(id) {
      try {
        await sbBusinesses.approve(id);
        if ('sbNotify' in window) sbNotify.success('Business approved');
        loadBusinesses();
      } catch (err) {
        if ('sbNotify' in window) sbNotify.error('Failed: ' + err.message);
        else alert('Failed: ' + err.message);
      }
    }

    function openEditModal(business) {
      document.getElementById('bf-id').value = business.id || '';
      document.getElementById('bf-name').value = business.name || '';
      document.getElementById('bf-slug').value = business.slug || '';
      document.getElementById('bf-category').value = business.category || '';
      document.getElementById('bf-website').value = business.website || '';
      document.getElementById('bf-description').value = business.description || '';
      document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    async function saveBusiness(e) {
      e.preventDefault();
      const id = document.getElementById('bf-id').value;
      const data = {
        name: document.getElementById('bf-name').value,
        slug: document.getElementById('bf-slug').value,
        category: document.getElementById('bf-category').value,
        website: document.getElementById('bf-website').value,
        description: document.getElementById('bf-description').value
      };
      try {
        await sbBusinesses.update(id, data);
        if ('sbNotify' in window) sbNotify.success('Business updated');
        closeEditModal();
        loadBusinesses();
      } catch (err) {
        if ('sbNotify' in window) sbNotify.error('Failed: ' + err.message);
        else alert('Failed: ' + err.message);
      }
    }

    async function init() {
      const user = await sbGetUser();
      if (!user) { window.location.href = '../dashboard.html'; return; }
      loadBusinesses();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
